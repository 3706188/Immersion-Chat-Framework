<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AI 沉浸式聊天</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/static/javascript.js" defer></script>

    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div id="selection-overlay">
      <div class="header-banner">
        <h1 class="glow-text">選擇你的聊天對象</h1>
      </div>
      <div class="character-grid">
        <div
          class="char-card"
          id="card-natsuki"
          data-id="tsundere"
          data-name="夏樹"
          data-avatar="/static/image/tsundere-icon.png"
        >
          <div class="char-img-container">
            <img src="/static/image/tsundere.png" alt="Natsuki" />
          </div>
          <div class="char-name-tag">夏樹 (Natsuki)</div>
          <div class="char-info-box">
            <h3>夏樹 (Natsuki)</h3>
            <p>「哼，既然你求我的話，就勉強陪你聊聊吧...」</p>
            <span class="tag">傲嬌系</span>
          </div>
        </div>

        <div
          class="char-card"
          id="card-yoyo"
          data-id="yoyo"
          data-name="yoyo"
          data-avatar="/static/image/yoyo-icon.png"
        >
          <div class="char-img-container">
            <img src="/static/image/yoyo.png" alt="Peach" />
          </div>
          <div class="char-name-tag">油油 (yoyo)</div>
          <div class="char-info-box">
            <h3>油油 (yoyo)</h3>
            <p>「歐嗨喲！今天也要充滿活力地一起努力喔！✨」</p>
            <span class="tag">活潑系</span>
          </div>
        </div>

        <div
          class="char-card"
          id="card-tt"
          data-id="tt"
          data-name="大叔"
          data-avatar="/static/image/men-icon.png"
        >
          <div class="char-img-container">
            <img src="/static/image/men.png" alt="Edwin" />
          </div>
          <div class="char-name-tag">大叔 (Sam)</div>
          <div class="char-info-box">
            <h3>大叔 (Sam)</h3>
            <p>「深呼吸...這裡是很安全的地方，告訴我你的感受。」</p>
            <span class="tag">療癒系</span>
          </div>
        </div>
      </div>
    </div>
    <div id="chat-container">
      <div id="header">
        <img
          id="current-avatar"
          class="avatar"
          src="https://api.dicebear.com/7.x/adventurer/svg?seed=Natsuki"
          title="點擊查看yoyo對你的記憶"
        />
        <div class="header-info">
          <div class="role-name" id="display-name">yoyo</div>
          <div class="user-status">🟢 線上中</div>
        </div>
        <button class="memory-btn">🧠 記憶摘要</button>
      </div>

      <div id="user-config">
        <span>當前使用者 ID:</span>
        <input
          type="text"
          id="user-id-input"
          value="u1"
          title="修改 ID 並按 Enter 會清空對話框"
        />
      </div>

      <div id="chat-box"></div>

      <div id="input-area">
        <input type="text" id="msg-input" placeholder="傳送您的訊息..." />
        <button class="send-btn">🚀</button>
      </div>
    </div>
  </body>
</html>
