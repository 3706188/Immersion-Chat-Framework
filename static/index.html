<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AI 沉浸式聊天</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/static/javascript.js" defer></script>

    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div id="selection-overlay">
      <h1 class="glow-text">選擇妳的 AI 夥伴</h1>
      <div class="character-grid">
        <div
          class="char-card"
          onclick="
            selectPersona(
              'tsundere',
              '夏樹',
              'https://api.dicebear.com/7.x/adventurer/svg?seed=Natsuki',
            )
          "
        >
          <div class="char-img-container">
            <img
              src="https://api.dicebear.com/7.x/adventurer/svg?seed=Natsuki"
              alt="Natsuki"
            />
          </div>
          <div class="char-info">
            <h3>夏樹 (Natsuki)</h3>
            <p>「哼，既然你求我的話，就勉強陪你聊聊吧...」</p>
            <span class="tag">傲嬌系</span>
          </div>
        </div>

        <div
          class="char-card"
          onclick="
            selectPersona(
              'yoyo',
              'yoyo',
              'https://api.dicebear.com/7.x/adventurer/svg?seed=Peach',
            )
          "
        >
          <div class="char-img-container">
            <img
              src="https://api.dicebear.com/7.x/adventurer/svg?seed=Peach"
              alt="Peach"
            />
          </div>
          <div class="char-info">
            <h3>yoyo</h3>
            <p>「歐嗨喲！今天也要充滿活力地一起努力喔！✨」</p>
            <span class="tag">活潑系</span>
          </div>
        </div>

        <div
          class="char-card"
          onclick="
            selectPersona(
              'tt',
              '大叔',
              'https://api.dicebear.com/7.x/adventurer/svg?seed=Edwin',
            )
          "
        >
          <div class="char-img-container">
            <img
              src="https://api.dicebear.com/7.x/adventurer/svg?seed=Edwin"
              alt="Edwin"
            />
          </div>
          <div class="char-info">
            <h3>大叔 (TT)</h3>
            <p>「深呼吸...這裡是很安全的地方，告訴我你的感受。」</p>
            <span class="tag">療癒系</span>
          </div>
        </div>
      </div>
    </div>
    <div id="chat-container">
      <div id="header">
        <img
          id="current-avatar"
          class="avatar"
          src="https://api.dicebear.com/7.x/adventurer/svg?seed=Natsuki"
          onclick="showMemory()"
          title="點擊查看yoyo對你的記憶"
        />
        <div class="header-info">
          <div class="role-name" id="display-name">yoyo</div>
          <div class="user-status">🟢 線上中</div>
        </div>
        <button class="memory-btn" onclick="showMemory()">🧠 記憶摘要</button>
      </div>

      <div id="user-config">
        <span>當前使用者 ID:</span>
        <input
          type="text"
          id="user-id-input"
          value="u1"
          onchange="handleUserChange()"
          title="修改 ID 並按 Enter 會清空對話框"
        />
      </div>

      <div id="chat-box"></div>

      <div id="input-area">
        <input
          type="text"
          id="msg-input"
          placeholder="傳送您的訊息..."
          onkeypress="if (event.keyCode == 13) sendMsg();"
        />
        <button class="send-btn" onclick="sendMsg()">🚀</button>
      </div>
    </div>
  </body>
</html>
